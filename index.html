<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Raunak Social</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <button id="menuBtn">☰</button>
  <h2>Raunak Social</h2>
  <input type="text" id="search" placeholder="Search posts...">
</header>

<div id="sidebar">
  <button data-page="home">Home</button>
  <button data-page="profile">Profile</button>
  <button data-page="messages">Messages</button>
  <button data-page="settings">Settings</button>
</div>

<main>
  <section id="home">
    <h3>Create Post</h3>
    <textarea id="postText"></textarea>
    <button id="postBtn">Post</button>
    <div id="feed"></div>
  </section>

  <section id="profile" class="hidden">
    <h3>Profile</h3>
    <input type="file" id="profileImage">
    <img id="profilePreview" width="150">
  </section>

  <section id="messages" class="hidden">
    <h3>Messages</h3>
    <input id="msgInput">
    <button id="sendMsg">Send</button>
    <ul id="msgList"></ul>
  </section>

  <section id="settings" class="hidden">
    <button id="darkMode">Toggle Dark Mode</button>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
